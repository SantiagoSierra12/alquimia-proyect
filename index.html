<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dim: #8A6A28;
  --gold-glow: rgba(201,168,76,0.15);
  --black: #0A0A0A;
  --black2: #111111;
  --black3: #1A1A1A;
  --black4: #242424;
  --black5: #2E2E2E;
  --gray: #888;
  --gray2: #555;
  --white: #F5F0E8;
  --white2: #BFB89A;

  --success: #27AE60;
  --radius: 10px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--white); height: 100%; }
body { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
.phone { width: 100%; max-width: 430px; min-height: 100vh; background: var(--black); position: relative; display: flex; flex-direction: column; overflow: hidden; }
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }
.scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
.scroll-body::-webkit-scrollbar { display: none; }
.topbar { background: var(--black2); border-bottom: 1px solid rgba(201,168,76,0.2); padding: 14px 16px 12px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.topbar-title { font-size: 17px; font-weight: 600; color: var(--white); flex: 1; letter-spacing: 0.02em; }
.back-btn { background: none; border: none; cursor: pointer; color: var(--gold); font-size: 22px; display: flex; padding: 0; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--black4); border: 1px solid var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; flex-shrink: 0; }
.logo-header { background: var(--black); padding: 48px 24px 36px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid rgba(201,168,76,0.15); }
.logo-emblem { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 24px rgba(201,168,76,0.2); }
.logo-emblem i { font-size: 28px; color: var(--gold); }
.logo-name { font-size: 28px; font-weight: 700; color: var(--gold); letter-spacing: 0.25em; text-transform: uppercase; }
.logo-tagline { font-size: 12px; color: var(--gray); letter-spacing: 0.15em; margin-top: 4px; }
.card { background: var(--black3); border: 1px solid rgba(201,168,76,0.15); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 12px; }
.card-dark { background: var(--black2); }
input, select, textarea { width: 100%; padding: 12px 14px; background: var(--black4); border: 1px solid var(--black5); border-radius: var(--radius); color: var(--white); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; margin-bottom: 12px; }
input:focus, select:focus { border-color: var(--gold-dim); }
input::placeholder { color: var(--gray2); }
select option { background: var(--black3); }
label.field-label { display: block; font-size: 11px; color: var(--gray); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
.btn-primary { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: var(--radius); color: var(--black); font-size: 15px; font-weight: 700; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }
.btn-secondary { padding: 9px 16px; background: transparent; border: 1px solid rgba(201,168,76,0.4); border-radius: var(--radius); color: var(--gold); font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s; }
.btn-secondary:active { background: var(--gold-glow); }
.btn-icon { background: none; border: none; cursor: pointer; color: var(--gold); font-size: 20px; display: flex; align-items: center; padding: 4px; }
.btn-small { padding: 6px 12px; font-size: 12px; font-weight: 600; background: var(--black4); border: 1px solid var(--black5); border-radius: 8px; color: var(--white2); cursor: pointer; }
.chip { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; border: 1px solid rgba(201,168,76,0.3); background: rgba(201,168,76,0.08); color: var(--gold); }
.section-label { font-size: 11px; font-weight: 700; color: var(--gold-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; margin-top: 4px; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat-card { background: var(--black3); border: 1px solid rgba(201,168,76,0.15); border-radius: var(--radius); padding: 14px 12px; }
.stat-n { font-size: 26px; font-weight: 700; color: var(--gold); }
.stat-l { font-size: 11px; color: var(--gray); margin-top: 2px; }
.alumno-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
.alumno-item:last-child { border-bottom: none; }
.alumno-item:active { opacity: 0.7; }
.error-msg { font-size: 12px; color: #E74C3C; margin-bottom: 8px; }
.divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0 16px; }
.tab-bar { display: flex; background: var(--black2); border-top: 1px solid rgba(201,168,76,0.2); flex-shrink: 0; }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 9px 4px 7px; cursor: pointer; gap: 3px; color: var(--gray); font-size: 10px; border: none; background: none; letter-spacing: 0.04em; }
.tab i { font-size: 20px; }
.tab.active { color: var(--gold); }
.days-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.days-scroll::-webkit-scrollbar { display: none; }
.day-btn { padding: 8px 14px; border-radius: var(--radius); border: 1px solid var(--black5); background: var(--black3); cursor: pointer; font-size: 13px; color: var(--gray); white-space: nowrap; font-weight: 500; transition: all 0.15s; }
.day-btn.active { background: rgba(201,168,76,0.12); color: var(--gold); border-color: var(--gold-dim); }
.ex-card { background: var(--black3); border: 1px solid rgba(201,168,76,0.1); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; }
.ex-header { padding: 14px 16px 10px; display: flex; align-items: flex-start; gap: 10px; }
.ex-num { width: 26px; height: 26px; border-radius: 50%; background: rgba(201,168,76,0.1); border: 1px solid var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--gold); flex-shrink: 0; margin-top: 1px; }
.ex-name { font-size: 15px; font-weight: 600; color: var(--white); }
.ex-note { font-size: 12px; color: var(--white2); margin-top: 4px; font-style: italic; }
.ex-meta-badge { background: var(--black4); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--white2); }
.ex-meta-badge span { color: var(--gold); font-weight: 700; }
.video-section { padding: 0 16px 12px; }
.video-toggle { display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; color: var(--gold-dim); font-size: 12px; font-weight: 600; letter-spacing: 0.05em; padding: 0; }
.video-toggle i { font-size: 16px; }
.video-embed { margin-top: 10px; border-radius: var(--radius); overflow: hidden; display: none; background: var(--black2); border: 1px solid rgba(201,168,76,0.15); }
.video-embed.open { display: block; }
.video-embed iframe { width: 100%; height: 200px; border: none; display: block; }
.muscle-tags { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: var(--black4); }
.series-section { padding: 0 16px 14px; }
.series-table-header { display: grid; grid-template-columns: 36px 1fr 1fr 36px; gap: 6px; margin-bottom: 6px; }
.series-col-label { font-size: 10px; color: var(--gray); text-align: center; font-weight: 600; letter-spacing: 0.06em; }
.series-row { display: grid; grid-template-columns: 36px 1fr 1fr 36px; gap: 6px; margin-bottom: 6px; align-items: center; }
.series-num { width: 30px; height: 30px; border-radius: 50%; background: var(--black5); border: 1px solid var(--black5); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--gray); transition: all 0.2s; }
.series-num.done { background: rgba(201,168,76,0.15); border-color: var(--gold-dim); color: var(--gold); }
.series-input { padding: 7px 8px; background: var(--black4); border: 1px solid var(--black5); border-radius: 8px; color: var(--white); font-size: 13px; text-align: center; font-family: inherit; outline: none; transition: border-color 0.2s; margin: 0; width: 100%; }
.series-input:focus { border-color: var(--gold-dim); }
.series-input.filled { border-color: rgba(201,168,76,0.4); color: var(--gold); }
.done-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--black5); background: var(--black4); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gray); font-size: 16px; transition: all 0.2s; }
.done-btn.checked { background: rgba(201,168,76,0.15); border-color: var(--gold-dim); color: var(--gold); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; z-index: 100; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal-sheet { background: var(--black2); border: 1px solid rgba(201,168,76,0.2); border-bottom: none; border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px 18px 36px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 3px; background: var(--black5); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 16px; }
.prog-bar { height: 3px; background: var(--black5); border-radius: 2px; margin-top: 8px; }
.prog-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); transition: width 0.3s; }
.history-entry { background: var(--black3); border: 1px solid rgba(201,168,76,0.1); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
.history-date { font-size: 11px; color: var(--gold-dim); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.05em; }
.history-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.history-row:last-child { border-bottom: none; }
.content-pad { padding: 16px; }
.row { display: flex; align-items: center; justify-content: space-between; }
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--gray); font-size: 13px; gap: 10px; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--black3); border: 1px solid rgba(201,168,76,0.3); border-radius: var(--radius); padding: 10px 20px; font-size: 13px; color: var(--gold); z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="phone" id="phone">
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="logo-header">
    <div class="logo-emblem"><i class="ti ti-bolt"></i></div>
    <div class="logo-name">Alquimia 90⚡️</div>
    <div class="logo-tagline">Transforma tu cuerpo · Eleva tu mente</div>
  </div>
  <div class="scroll-body" style="padding-bottom:24px;">
    <div class="content-pad">
      <div class="card" style="margin-top:8px;">
        <p class="section-label" style="margin-bottom:14px;">Acceder</p>
        <label class="field-label">Usuario</label>
        <input type="text" id="login-user" placeholder="tu_usuario" autocomplete="username" />
        <label class="field-label">Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
        <p class="error-msg" id="login-error" style="display:none;">Usuario o contraseña incorrectos.</p>
        <button class="btn-primary" onclick="doLogin()">Ingresar</button>
      </div>
      <p style="text-align:center;font-size:12px;color:var(--gray);margin-top:10px;">
        ¿Entrenador? <span style="color:var(--gold);cursor:pointer;font-weight:600;" onclick="fillCoach()">Acceso coach</span>
      </p>
    </div>
  </div>
</div>

<!-- COACH -->
<div class="screen" id="screen-coach" style="height:100vh;">
  <div class="topbar">
    <div class="avatar">BA</div>
    <span class="topbar-title">Panel coach</span>
    <button class="btn-secondary" onclick="logout()" style="padding:6px 12px;font-size:12px;">Salir</button>
  </div>
  <div class="scroll-body" style="flex:1;overflow-y:auto;">
    <div class="content-pad" id="coach-main">
      <div class="stat-grid" id="coach-stats"></div>
      <div class="row" style="margin-bottom:12px;">
        <p class="section-label" style="margin:0;">Alumnos</p>
        <button class="btn-secondary" onclick="openModal('modal-add-alumno')" style="padding:7px 14px;font-size:12px;">
          <i class="ti ti-plus" style="font-size:14px;vertical-align:-2px;"></i> Nuevo
        </button>
      </div>
      <div class="card card-dark" style="padding:0 18px;" id="alumnos-list"><div class="loading"><i class="ti ti-loader-2"></i> Cargando...</div></div>
    </div>
  </div>
  <div class="tab-bar" style="flex-shrink:0;position:sticky;bottom:0;z-index:10;">
    <button class="tab active" id="tab-coach-alu" onclick="coachTab('alu')"><i class="ti ti-users"></i>Alumnos</button>
    <button class="tab" id="tab-coach-hist" onclick="coachTab('hist')"><i class="ti ti-chart-line"></i>Progreso</button>
    <button class="tab" id="tab-coach-creds" onclick="coachTab('creds')"><i class="ti ti-key"></i>Accesos</button>
  </div>
</div>

<!-- COACH – ALUMNO DETAIL -->
<div class="screen" id="screen-alumno-detail">
  <div class="topbar">
    <button class="back-btn" onclick="goScreen('screen-coach');coachTab('alu')"><i class="ti ti-arrow-left"></i></button>
    <span class="topbar-title" id="detail-title">Alumno</span>
    <button class="btn-secondary" onclick="openAddRutina()" style="padding:7px 14px;font-size:12px;">
      <i class="ti ti-plus" style="font-size:14px;vertical-align:-2px;"></i> Ejercicio
    </button>
  </div>
  <div class="scroll-body">
    <div class="content-pad">
      <div class="card" id="detail-info-card"></div>
      <div class="divider"></div>
      <p class="section-label">Rutinas asignadas</p>
      <div id="detail-rutinas-list"></div>
    </div>
  </div>
</div>

<!-- ALUMNO -->
<div class="screen" id="screen-alumno">
  <div class="topbar">
    <div class="avatar" id="alu-av">--</div>
    <span class="topbar-title" id="alu-name-top">Mi rutina</span>
    <button class="btn-secondary" onclick="logout()" style="padding:6px 12px;font-size:12px;">Salir</button>
  </div>
  <div class="scroll-body">
    <div class="content-pad">
      <div class="days-scroll" id="days-scroll"></div>
      <div id="alu-rutina"></div>
    </div>
  </div>
</div>

<!-- MODAL ADD ALUMNO -->
<div class="modal-overlay" id="modal-add-alumno">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="row" style="margin-bottom:16px;">
      <p class="modal-title" style="margin:0;">Nuevo alumno</p>
      <button class="btn-icon" onclick="closeModal('modal-add-alumno')"><i class="ti ti-x"></i></button>
    </div>
    <label class="field-label">Nombre completo</label>
    <input type="text" id="new-nombre" placeholder="Ej: Carlos Pérez" />
    <label class="field-label">Usuario</label>
    <input type="text" id="new-user" placeholder="carlos.perez" />
    <label class="field-label">Contraseña</label>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">
      <input type="text" id="new-pass" placeholder="Auto-generada" style="margin:0;flex:1;" />
      <button class="btn-small" onclick="genPass()" style="white-space:nowrap;"><i class="ti ti-refresh" style="vertical-align:-2px;font-size:13px;"></i> Generar</button>
    </div>
    <label class="field-label">Días de entrenamiento</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;" id="dias-selector">
      <button class="day-btn" onclick="toggleDia(this)">Lun</button>
      <button class="day-btn" onclick="toggleDia(this)">Mar</button>
      <button class="day-btn" onclick="toggleDia(this)">Mié</button>
      <button class="day-btn" onclick="toggleDia(this)">Jue</button>
      <button class="day-btn" onclick="toggleDia(this)">Vie</button>
      <button class="day-btn" onclick="toggleDia(this)">Sáb</button>
      <button class="day-btn" onclick="toggleDia(this)">Dom</button>
    </div>
    <button class="btn-primary" onclick="addAlumno()">Crear alumno</button>
  </div>
</div>

<!-- MODAL ADD RUTINA -->
<div class="modal-overlay" id="modal-add-rutina">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="row" style="margin-bottom:16px;">
      <p class="modal-title" style="margin:0;">Agregar ejercicio</p>
      <button class="btn-icon" onclick="closeModal('modal-add-rutina')"><i class="ti ti-x"></i></button>
    </div>
    <label class="field-label">Día</label>
    <select id="rut-dia">
      <option>Lunes</option><option>Martes</option><option>Miércoles</option>
      <option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
    </select>
    <label class="field-label">Grupo muscular</label>
    <select id="rut-grupo">
      <option>Pecho</option><option>Espalda</option><option>Hombros</option>
      <option>Bíceps</option><option>Tríceps</option><option>Piernas</option>
      <option>Glúteos</option><option>Abdomen</option><option>Full body</option>
    </select>
    <label class="field-label">Ejercicio</label>
    <input type="text" id="rut-ejercicio" placeholder="Ej: Press de banca" />
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <div><label class="field-label">Series</label><input type="number" id="rut-series" placeholder="4" style="margin:0;" /></div>
      <div><label class="field-label">Reps obj.</label><input type="number" id="rut-reps" placeholder="12" style="margin:0;" /></div>
      <div><label class="field-label">Peso (kg)</label><input type="number" id="rut-peso" placeholder="60" style="margin:0;" /></div>
    </div>
    <label class="field-label">Notas</label>
    <input type="text" id="rut-notas" placeholder="Ej: Bajar lento en negativa" />
    <button class="btn-primary" style="margin-top:4px;" onclick="addRutina()">Guardar ejercicio</button>
  </div>
</div>

<!-- MODAL EDIT RUTINA -->
<div class="modal-overlay" id="modal-edit-rutina">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="row" style="margin-bottom:16px;">
      <p class="modal-title" style="margin:0;">Editar ejercicio</p>

      <option>Jueves</option><option>Viernes</option><option>Sábado</option><option>Domingo</option>
    </select>
    <label class="field-label">Grupo muscular</label>
    <select id="edit-rut-grupo">
      <option>Pecho</option><option>Espalda</option><option>Hombros</option>
      <option>Bíceps</option><option>Tríceps</option><option>Piernas</option>
      <option>Glúteos</option><option>Abdomen</option><option>Full body</option>

    <label class="field-label">Ejercicio</label>
    <input type="text" id="edit-rut-ejercicio" placeholder="Ej: Press de banca" />

      <div><label class="field-label">Peso (kg)</label><input type="number" id="edit-rut-peso" placeholder="60" style="margin:0;" /></div>
    </div>
    <label class="field-label" style="margin-top:12px;">Notas</label>
    <input type="text" id="edit-rut-notas" placeholder="Ej: Bajar lento en negativa" />
    <button class="btn-primary" style="margin-top:8px;" onclick="saveEditRutina()">Guardar cambios</button>
  </div>
</div>

<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="modal-overlay" id="modal-confirm-delete">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <p class="modal-title" style="margin-bottom:8px;">Eliminar ejercicio</p>
    <p id="confirm-delete-msg" style="font-size:14px;color:var(--white2);margin-bottom:20px;"></p>

async function coachTab(tab) {

    </div>
    <div class="row" style="margin-bottom:12px;"><p class="section-label" style="margin:0;">Historial por alumno</p></div>`;

    let totalSeries = 0;
    for (const a of state.alumnos) {
      const { data: logs } = await sb.from('logs_series').select('*, rutinas(ejercicio)')
        .eq('alumno_id', a.id).eq('completada', true).order('fecha', { ascending: false }).limit(20);
      if (!logs || !logs.length) continue;
      totalSeries += logs.length;
      const byFecha = {};
      logs.forEach(l => {
        const f = l.fecha;
        if (!byFecha[f]) byFecha[f] = {};
        const ej = l.rutinas?.ejercicio || 'Ejercicio';
        if (!byFecha[f][ej]) byFecha[f][ej] = [];
        byFecha[f][ej].push(l);
      });
      html += `<p class="section-label" style="margin-top:12px;">${a.nombre}</p>`;
      Object.entries(byFecha).slice(0,5).forEach(([fecha, ejercicios]) => {
        html += `<div class="history-entry"><div class="history-date">${fecha}</div>`;
        Object.entries(ejercicios).forEach(([ej, series]) => {
          html += `<div class="history-row"><span style="color:var(--white2);">${ej}</span><span style="color:var(--gray);">${series.length} series</span></div>`;
          series.forEach((s,i) => {
            html += `<div class="history-row" style="padding-left:8px;"><span style="color:var(--gray);">Serie ${s.serie_num}</span><span style="color:var(--gold);">${s.reps_hechas} reps · ${s.peso_usado} kg</span></div>`;
          });
        });
        html += `</div>`;
      });
    }
    if (totalSeries === 0) html += `<p style="font-size:13px;color:var(--gray);">Aún no hay registros de entrenamiento.</p>`;
    document.getElementById('coach-main').innerHTML = html;
    const el = document.getElementById('stat-sesiones');
    if (el) el.textContent = totalSeries;
    return;
  }

    await loadAlumnos();

      <div class="stat-grid">
        <div class="stat-card"><div class="stat-n">${state.alumnos.length}</div><div class="stat-l">Alumnos</div></div>
        <div class="stat-card"><div class="stat-n"><i class="ti ti-shield-lock" style="font-size:22px;color:var(--gold);"></i></div><div class="stat-l">Accesos seguros</div></div>
      </div>
      <div class="row" style="margin-bottom:12px;">
        <p class="section-label" style="margin:0;">Credenciales</p>
        <button class="btn-secondary" onclick="openModal('modal-add-alumno')" style="padding:7px 14px;font-size:12px;"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px;"></i> Nuevo</button>
      </div>
      ${state.alumnos.map(a => `
        <div class="card card-dark" style="margin-bottom:10px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <div class="avatar">${a.nombre.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>

            <button onclick="confirmDeleteAlumno('${a.id}','${a.nombre}')" style="background:rgba(192,57,43,0.1);border:1px solid rgba(192,57,43,0.3);border-radius:8px;padding:6px 8px;cursor:pointer;color:#E74C3C;font-size:14px;">
              <i class="ti ti-trash"></i>
            </button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div><p class="section-label" style="margin-bottom:2px;">Usuario</p><p style="font-size:13px;color:var(--gold);">@${a.usuario}</p></div>
            <div><p class="section-label" style="margin-bottom:2px;">Contraseña</p><p style="font-size:13px;color:var(--white2);font-family:monospace;">${a.contrasena}</p></div>

// Cache para no repetir llamadas a la API
const gifCache = {};

async function fetchExerciseGif(nombre) {
  if (gifCache[nombre]) return gifCache[nombre];
  try {
    // Normalizar nombre: quitar tildes, minúsculas, reemplazar espacios por +
    const query = nombre.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,'+');
    const res = await fetch(`https://exercisedb.p.rapidapi.com/exercises/name/${encodeURIComponent(query)}?limit=1`, {
      headers: {
        'X-RapidAPI-Key': 'DEMO', // sin key devuelve igual algunos resultados
        'X-RapidAPI-Host': 'exercisedb.p.rapidapi.com'
      }
    });
    if (!res.ok) throw new Error('api error');
    const data = await res.json();
    if (data && data.length > 0) {
      gifCache[nombre] = { gif: data[0].gifUrl, muscles: data[0].targetMuscles || data[0].secondaryMuscles || [] };
      return gifCache[nombre];
    }
  } catch(e) {}
  // Fallback: usar muscles del mapa interno + gif de wger (open source, sin key)
  try {
    const query = nombre.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
    const res2 = await fetch(`https://wger.de/api/v2/exercise/search/?term=${encodeURIComponent(query)}&language=es&format=json`);
    if (res2.ok) {
      const d2 = await res2.json();
      if (d2.suggestions && d2.suggestions.length > 0) {
        const exId = d2.suggestions[0].data?.id;
        if (exId) {
          const imgRes = await fetch(`https://wger.de/api/v2/exerciseimage/?exercise=${exId}&format=json`);
          if (imgRes.ok) {
            const imgData = await imgRes.json();
            if (imgData.results && imgData.results.length > 0) {
              gifCache[nombre] = { gif: imgData.results[0].image, muscles: [] };
              return gifCache[nombre];
            }
          }
        }
      }
    }
  } catch(e) {}
  gifCache[nombre] = null;
  return null;
}

async function toggleDemo(rutId, nombreEjercicio, grupo) {
  const panel = document.getElementById('demo_'+rutId);
  const chev = document.getElementById('demochev_'+rutId);
  const isOpen = panel.classList.contains('open');

  if (isOpen) {
    panel.classList.remove('open');
    chev.className = 'ti ti-chevron-down';
    return;
  }

  panel.classList.add('open');
  chev.className = 'ti ti-chevron-up';

  // Si ya tiene contenido, no volver a cargar
  if (panel.dataset.loaded === '1') return;
  panel.innerHTML = `<div style="padding:20px;text-align:center;color:var(--gray);font-size:12px;">
    <i class="ti ti-loader-2" style="font-size:20px;"></i><br>Cargando demostración...
  </div>`;

  const rutMuscles = muscleMap[grupo] || [];
  const result = await fetchExerciseGif(nombreEjercicio);

  let gifHTML = '';
  if (result && result.gif) {
    gifHTML = `<img src="${result.gif}" alt="${nombreEjercicio}" style="width:100%;border-radius:0;display:block;max-height:220px;object-fit:cover;" />`;
  } else {
    gifHTML = `<div style="padding:20px;text-align:center;color:var(--gray);font-size:12px;">
      <i class="ti ti-help-circle" style="font-size:24px;color:var(--gold-dim);"></i>
      <p style="margin-top:8px;">No encontramos animación para este ejercicio.</p>
      <p style="margin-top:4px;font-size:11px;">Consultá con tu entrenador la técnica correcta.</p>
    </div>`;
  }

  const allMuscles = result?.muscles?.length ? result.muscles : rutMuscles;
  const muscleChips = allMuscles.length
    ? `<div class="muscle-tags">${allMuscles.map(m=>`<span class="chip" style="font-size:10px;padding:2px 8px;color:var(--white2);border-color:rgba(201,168,76,0.2);">${m}</span>`).join('')}</div>`
    : '';

  panel.innerHTML = gifHTML + muscleChips;
  panel.dataset.loaded = '1';
}

function renderExCard(alu, rut, idx, logs, muscles) {
  const rutMuscles = muscleMap[rut.grupo] || muscles;
  const seriesArr = Array.from({length: rut.series}, (_, i) => {
    const existing = logs.find(l => l.rutina_id === rut.id && l.serie_num === i+1);
    return existing || { serie_num: i+1, reps_hechas: rut.reps, peso_usado: rut.peso||0, completada: false };
  });
  const done = seriesArr.filter(s => s.completada).length;
  const pct = Math.round((done / rut.series) * 100);

  const seriesRows = seriesArr.map((s, i) => `
    <div class="series-row">
      <div class="series-num${s.completada?' done':''}" id="snum_${rut.id}_${i}">${i+1}</div>
      <input class="series-input${s.completada?' filled':''}" type="number" id="sreps_${rut.id}_${i}"
        value="${s.reps_hechas}" min="0" placeholder="${rut.reps}" />
      <input class="series-input${s.completada?' filled':''}" type="number" id="speso_${rut.id}_${i}"
        value="${s.peso_usado}" min="0" placeholder="${rut.peso||0}" />
      <button class="done-btn${s.completada?' checked':''}" id="sdone_${rut.id}_${i}"
        onclick="toggleSeriesDone('${alu.id}','${rut.id}',${i},${rut.series})">
        <i class="ti ti-check"></i>
      </button>
    </div>
  `).join('');

  // Escapar el nombre para usarlo en onclick
  const nombreEsc = rut.ejercicio.replace(/'/g, "\\'");

  return `<div class="ex-card" id="excard_${rut.id}">
    <div class="ex-header" style="cursor:pointer;" onclick="toggleDemo('${rut.id}','${nombreEsc}','${rut.grupo}')">
      <div class="ex-num">${idx+1}</div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div class="ex-name">${rut.ejercicio}</div>
          <div style="display:flex;align-items:center;gap:4px;color:var(--gold-dim);font-size:11px;font-weight:600;letter-spacing:0.04em;">
            <i class="ti ti-player-play" style="font-size:13px;"></i>
            <span>Ver demo</span>
            <i class="ti ti-chevron-down" id="demochev_${rut.id}" style="font-size:14px;"></i>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;">
          <div class="ex-meta-badge"><span>${rut.series}</span> series</div>
          <div class="ex-meta-badge"><span>${rut.reps}</span> reps obj.</div>
          <div class="ex-meta-badge"><span>${rut.peso||'PC'}</span>${rut.peso?' kg':''}</div>
        </div>
        ${rut.notas?`<div class="ex-note" style="margin-top:6px;">${rut.notas}</div>`:''}
        <div class="prog-bar"><div class="prog-fill" id="prog_${rut.id}" style="width:${pct}%;"></div></div>
      </div>
    </div>

    <!-- Panel demostrativo (se abre al tocar el header) -->
    <div id="demo_${rut.id}" class="video-embed" style="border-radius:0;border-left:none;border-right:none;"></div>

    <div class="series-section">
      <div class="series-table-header">
        <div class="series-col-label">Serie</div>
        <div class="series-col-label">Reps</div>
        <div class="series-col-label">Peso kg</div>
        <div class="series-col-label">✓</div>
      </div>
      ${seriesRows}
    </div>
  </div>`;
}

async function toggleSeriesDone(aluId, rutId, serieIdx, totalSeries) {
  const reps = parseFloat(document.getElementById(`sreps_${rutId}_${serieIdx}`).value) || 0;
  const peso = parseFloat(document.getElementById(`speso_${rutId}_${serieIdx}`).value) || 0;
  const doneBtn = document.getElementById(`sdone_${rutId}_${serieIdx}`);
  const snum = document.getElementById(`snum_${rutId}_${serieIdx}`);
  const sreps = document.getElementById(`sreps_${rutId}_${serieIdx}`);
  const speso = document.getElementById(`speso_${rutId}_${serieIdx}`);
  const isNowDone = !doneBtn.classList.contains('checked');

  doneBtn.classList.toggle('checked', isNowDone);
  snum.classList.toggle('done', isNowDone);
  sreps.classList.toggle('filled', isNowDone);
  speso.classList.toggle('filled', isNowDone);

  // Guardar en Supabase
  const fecha = todayStr();
  const { data: existing } = await sb.from('logs_series').select('id')
    .eq('alumno_id', aluId).eq('rutina_id', rutId)
    .eq('fecha', fecha).eq('serie_num', serieIdx+1).maybeSingle();

  if (existing) {
    await sb.from('logs_series').update({ reps_hechas: reps, peso_usado: peso, completada: isNowDone })
      .eq('id', existing.id);
  } else {
    await sb.from('logs_series').insert({
      alumno_id: aluId, rutina_id: rutId, fecha,
      serie_num: serieIdx+1, reps_hechas: reps, peso_usado: peso, completada: isNowDone
    });
  }

  // Actualizar barra de progreso
  const { count } = await sb.from('logs_series').select('id', { count: 'exact', head: true })
    .eq('alumno_id', aluId).eq('rutina_id', rutId).eq('fecha', fecha).eq('completada', true);
  const pct = Math.round((count / totalSeries) * 100);
  const prog = document.getElementById(`prog_${rutId}`);
  if (prog) prog.style.width = pct + '%';
  if (isNowDone) showToast('Serie registrada ✓');
}

// ═══ EDITAR RUTINA ═══
let deleteRutinaId = null;

async function openEditRutina(id) {
  // Buscar el ejercicio en Supabase
  const { data, error } = await sb.from('rutinas').select('*').eq('id', id).single();
  if (error || !data) { showToast('Error al cargar ejercicio'); return; }
  document.getElementById('edit-rut-id').value = data.id;
  document.getElementById('edit-rut-dia').value = data.dia;
  document.getElementById('edit-rut-grupo').value = data.grupo;
  document.getElementById('edit-rut-ejercicio').value = data.ejercicio;
  document.getElementById('edit-rut-series').value = data.series;
  document.getElementById('edit-rut-reps').value = data.reps;
  document.getElementById('edit-rut-peso').value = data.peso || '';
  document.getElementById('edit-rut-notas').value = data.notas || '';
  openModal('modal-edit-rutina');
}

async function saveEditRutina() {
  const id = document.getElementById('edit-rut-id').value;
  const dia = document.getElementById('edit-rut-dia').value;
  const grupo = document.getElementById('edit-rut-grupo').value;
  const ejercicio = document.getElementById('edit-rut-ejercicio').value.trim();
  const series = parseInt(document.getElementById('edit-rut-series').value) || 3;
  const reps = parseInt(document.getElementById('edit-rut-reps').value) || 12;
  const peso = parseFloat(document.getElementById('edit-rut-peso').value) || 0;
  const notas = document.getElementById('edit-rut-notas').value.trim();
  if (!ejercicio) { showToast('Ingresá el nombre del ejercicio'); return; }

  const { error } = await sb.from('rutinas').update({ dia, grupo, ejercicio, series, reps, peso, notas }).eq('id', id);
  if (error) { showToast('Error al guardar'); console.error(error); return; }
  closeModal('modal-edit-rutina');
  showToast('Ejercicio actualizado ✓');
  const ruts = await loadRutinas(state.currentAlumnoId);
  renderDetailRutinas(ruts);
}

function confirmDeleteRutina(id, nombre) {
  deleteRutinaId = id;
  document.getElementById('confirm-delete-msg').textContent = `¿Eliminás "${nombre}"? Esta acción no se puede deshacer.`;
  openModal('modal-confirm-delete');
}

// ═══ ELIMINAR ALUMNO ═══
let deleteAlumnoId = null;

function confirmDeleteAlumno(id, nombre) {
  deleteAlumnoId = id;
  document.getElementById('confirm-delete-msg').textContent = `¿Eliminás a "${nombre}"? Se borrarán también sus rutinas y registros. Esta acción no se puede deshacer.`;
  openModal('modal-confirm-delete');
}

async function executeDelete() {
  // Eliminar rutina si deleteRutinaId está seteado
  if (deleteRutinaId) {
    const { error } = await sb.from('rutinas').delete().eq('id', deleteRutinaId);
    if (error) { showToast('Error al eliminar'); console.error(error); return; }
    closeModal('modal-confirm-delete');
    showToast('Ejercicio eliminado');
    deleteRutinaId = null;
    const ruts = await loadRutinas(state.currentAlumnoId);
    renderDetailRutinas(ruts);
    return;
  }
  // Eliminar alumno si deleteAlumnoId está seteado
  if (deleteAlumnoId) {
    // Borrar logs primero
    await sb.from('logs_series').delete().eq('alumno_id', deleteAlumnoId);
    // Borrar rutinas
    await sb.from('rutinas').delete().eq('alumno_id', deleteAlumnoId);
    // Borrar alumno
    const { error } = await sb.from('alumnos').delete().eq('id', deleteAlumnoId);
    if (error) { showToast('Error al eliminar'); console.error(error); return; }
    closeModal('modal-confirm-delete');
    showToast('Alumno eliminado');
    deleteAlumnoId = null;
    coachTab('creds');
    return;
  }
}


// ═══ SWIPE BACK ═══
(function() {
  // Pantallas con acción de "volver"
  const swipeScreens = {
    'screen-alumno-detail': () => { goScreen('screen-coach'); coachTab('alu'); },
  };

  let touchStartX = 0;
  let touchStartY = 0;

  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    // Swipe derecha: dx > 60px, más horizontal que vertical
    if (dx > 60 && dy < 80) {
      const activeScreen = document.querySelector('.screen.active');
      if (activeScreen && swipeScreens[activeScreen.id]) {
        swipeScreens[activeScreen.id]();
      }
    }
  }, { passive: true });
})();

// ═══ INIT ═══
async function init() {
  await loadAlumnos();
}
init();
</script>
